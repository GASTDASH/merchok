name: merchok
# description: "A new Flutter project."
publish_to: 'none'
version: 0.4.1-dev

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  barcode: ^2.2.9
  barcode_widget: ^2.0.4
  collection: ^1.19.1
  csv: ^6.0.0
  dotted_border: ^3.1.0
  equatable: ^2.0.8
  file_picker: ^10.3.10
  file_saver: ^0.3.1
  firebase_core: ^4.4.0
  fl_chart: ^1.1.1
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  flutter_spinkit: ^5.2.2
  flutter_svg: ^2.2.3
  fluttertoast: ^9.0.0
  get_it: ^9.2.0
  go_router: ^17.1.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  image: ^4.7.2
  image_picker: ^1.2.1
  intl: ^0.20.2
  markdown_widget: ^2.3.2+8
  mobile_scanner: ^7.1.4
  package_info_plus: ^9.0.0
  permission_handler: ^12.0.1
  provider: ^6.1.5+1
  rotated_corner_decoration: ^2.1.0+1
  rxdart: ^0.28.0
  shared_preferences: ^2.5.4
  skeletonizer: ^2.1.2
  super_sliver_list: ^0.4.1
  talker_bloc_logger: ^5.1.13
  talker_flutter: ^5.1.13
  url_launcher: ^6.3.2
  uuid: ^4.5.2
  yandex_mobileads: ^7.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_ce_generator: ^1.11.1
  build_runner: ^2.11.0

flutter:
  uses-material-design: true

  assets:
    - assets/docs/privacy_policy/
    - assets/docs/terms_conditions/
    - assets/icons/
    - assets/icons/banks/
    - assets/images/

  fonts:
    - family: Merchok
      fonts:
        - asset: assets/fonts/Merchok-Icons.ttf
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Thin.ttf
          weight: 100
        - asset: assets/fonts/Montserrat-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Montserrat-Light.ttf
          weight: 300
        - asset: assets/fonts/Montserrat-Regular.ttf
          weight: 400
        - asset: assets/fonts/Montserrat-Medium.ttf
          weight: 500
        - asset: assets/fonts/Montserrat-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700
        - asset: assets/fonts/Montserrat-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Montserrat-Black.ttf
          weight: 900

flutter_intl:
  enabled: true
